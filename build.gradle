plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.107'
}

group = 'cz.matej'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

neoForge {
    version = '21.1.227'
}

dependencies {
    compileOnly files('libs/sable-companion-common-1.6.0.jar')
    compileOnly files('libs/irons_spellbooks-1.21.1-3.15.6.jar')
    compileOnly files('libs/sable-neoforge-1.21.1-1.2.2.jar')
    compileOnly files('libs/waystonessable-1.0.2.jar')
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

tasks.named('jar', Jar) {
    manifest {
        attributes(
                'MixinConfigs': 'ironssableguard.mixins.json'
        )
    }
}